<!DOCTYPE html>
<html>
<head>
<style>
table, th, td {
  border: 1px solid black;
}
</style>
</head>
<body>

<h1>The col element illustration</h1>

<table>
  <colgroup>
    <col span="2" style="background-color:red">
    <col style="background-color:yellow">
  </colgroup>
  <tr>
    <th>First Name</th>
    <th>Last Name</th>
    <th>Age</th>
    <th>Department</th>
  </tr>
  <tr>
    <td>Bob</td>
    <td>Fung</td>
    <td>26</td>
    <td>Computer Science</td>
  </tr>
  <tr>
    <td>Sam</td>
    <td>Fung</td>
    <td>26</td>
    <td>Mechanical</td>
  </tr>
</table>

</body>
</html>
